<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Custom Hat & Millinery Studio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>

  <div id="page-loader"
    style="position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity 0.6s ease;">
    <div style="font-family:'Playfair Display',serif;font-size:2rem;letter-spacing:4px;color:#121212;">HMS</div>
  </div>

  <!-- ========== AUTH SECTION ========== -->
  <main class="auth-container">
    <div class="auth-card reveal">
      <div class="text-center mb-4">
        <a href="../index.html" class="navbar-brand script-font" style="font-size: 3.5rem;">HMS</a>
      </div>

      <h1 class="auth-title">Join the Studio</h1>
      <p class="auth-subtitle">Create an account for bespoke studio access</p>

      <form id="signup-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" placeholder="Jane Doe" required>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-input" placeholder="Min. 8 characters" required>
            <span class="toggle-password" aria-label="Toggle password visibility">
              <i class="bi bi-eye"></i>
            </span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-input" placeholder="Re-enter your password" required>
            <span class="toggle-password" aria-label="Toggle password visibility">
              <i class="bi bi-eye"></i>
            </span>
          </div>
        </div>

        <div class="mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="termsAgree" required>
            <label class="form-check-label" for="termsAgree" style="font-size: 0.8rem; color: var(--clr-text-muted);">
              I agree to the <a href="#" class="auth-link">Terms & Conditions</a>
            </label>
          </div>
        </div>

        <button type="submit" class="btn-luxury btn-auth">Create Account</button>
      </form>

      <div class="auth-divider">or continue with</div>

      <div class="social-auth">
        <a href="#" class="btn-social">
          <i class="bi bi-google"></i> Google Account
        </a>
        <a href="#" class="btn-social">
          <i class="bi bi-apple"></i> Apple ID
        </a>
      </div>

      <div class="auth-footer">
        Already have an account? <a href="login.html" class="auth-link">Login Here</a>
      </div>

      <div class="text-center mt-4">
        <a href="../index.html"
          style="font-size: 0.8rem; color: var(--clr-text-muted); text-transform: uppercase; letter-spacing: 1px;">
          <i class="bi bi-arrow-left me-1"></i> Back to Home
        </a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/script.js"></script>
</body>

</html>
